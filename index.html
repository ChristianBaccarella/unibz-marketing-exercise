<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Student</title><style>body{font-family:Arial;background:#f4f4f4;padding:20px}h1{text-align:center}.container{max-width:600px;margin:auto;background:white;padding:20px;border-radius:8px}textarea{width:100%;height:80px;margin:10px 0;border:1px solid #ccc}#timer{font-size:2em;text-align:center;color:red}button{width:100%;padding:10px;background:#28a745;color:white;border:none;cursor:pointer}</style></head><body><div class="container"><h1>Student Exercise</h1><div id="timer">90:00</div><textarea id="ex1" placeholder="Exercise 1"></textarea><textarea id="ex2" placeholder="Exercise 2"></textarea><textarea id="ex3" placeholder="Exercise 3"></textarea><button onclick="alert('Saved!')">Save</button></div><script>let t=90*60;setInterval(()=>{let m=Math.floor(t/60);let s=t%60;document.getElementById("timer").textContent=m+":"+(s<10?"0":"")+s;if(t>0)t--},1000)</script></body></html>
