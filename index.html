<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Exercise Timer</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #timer { font-size: 2em; margin: 20px; }\n        #exercise-list { margin: 20px; }\n        .exercise { margin: 10px 0; }\n    </style>\n</head>\n<body>\n    <h1>Exercise Timer</h1>\n    <div id="timer">00:00</div>\n    <button id="start">Start</button>\n    <button id="stop">Stop</button>\n    <button id="reset">Reset</button>\n    <div id="exercise-list">\n        <div class="exercise">Exercise 1: <input type="checkbox" /></div>\n        <div class="exercise">Exercise 2: <input type="checkbox" /></div>\n        <div class="exercise">Exercise 3: <input type="checkbox" /></div>\n    </div>\n    <div id="score">Score: 0</div>\n    <script>\n        var timer = 0;\n        var interval;\n        var score = 0;\n        var checkboxes = document.querySelectorAll('.exercise input[type="checkbox"]');\n\n        function startTimer() {\n            interval = setInterval(() => {\n                timer++;\n                document.getElementById('timer').innerText = new Date(timer * 1000).toISOString().substr(11, 8);\n            }, 1000);\n        }\n\n        document.getElementById('start').onclick = () => {\n            startTimer();\n        };\n\n        document.getElementById('stop').onclick = () => {\n            clearInterval(interval);\n        };\n\n        document.getElementById('reset').onclick = () => {\n            clearInterval(interval);\n            timer = 0;\n            score = 0;\n            document.getElementById('timer').innerText = '00:00';\n            document.getElementById('score').innerText = 'Score: ' + score;\n            checkboxes.forEach(cb => cb.checked = false);\n        };\n\n        checkboxes.forEach(cb => {\n            cb.onchange = () => {\n                if (cb.checked) {\n                    score++;\n                } else {\n                    score--;\n                }\n                document.getElementById('score').innerText = 'Score: ' + score;\n            };\n        });\n    <\/script>\n</body>\n</html>\n
