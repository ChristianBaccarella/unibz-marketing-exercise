<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Student Interface</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .timer { font-size: 24px; margin-bottom: 20px; }\n        .exercise { margin-bottom: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Student Interface</h1>\n    <div class="timer">Time Left: <span id="time">90:00</span></div>\n    <div id="exercises">\n        <div class="exercise">Exercise 1: <input type="text" id="exercise1"></div>\n        <div class="exercise">Exercise 2: <input type="text" id="exercise2"></div>\n        <div class="exercise">Exercise 3: <input type="text" id="exercise3"></div>\n    </div>\n    <button id="saveButton">Auto-save</button>\n    <div id="score">Score: <span id="scoreValue">0</span></div>\n    <script>\n        let timeLeft = 5400; // 90 minutes in seconds\n        let score = 0;\n\n        function startTimer() {\n            const timerElement = document.getElementById('time');\n            const interval = setInterval(() => {\n                if (timeLeft <= 0) {\n                    clearInterval(interval);\n                    alert('Time is up!');\n                } else {\n                    timeLeft--;\n                    const minutes = Math.floor(timeLeft / 60);\n                    const seconds = timeLeft % 60;\n                    timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;\n                }\n            }, 1000);\n        }\n\n        document.getElementById('saveButton').addEventListener('click', () => {\n            const exercise1 = document.getElementById('exercise1').value;\n            const exercise2 = document.getElementById('exercise2').value;\n            const exercise3 = document.getElementById('exercise3').value;\n            // Implement auto-save functionality (temporary storage for this example)\n            localStorage.setItem('exercise1', exercise1);\n            localStorage.setItem('exercise2', exercise2);\n            localStorage.setItem('exercise3', exercise3);\n            alert('Exercises saved!');\n        });\n\n        function updateScore() {\n            score = 0;\n            if (document.getElementById('exercise1').value) score++;\n            if (document.getElementById('exercise2').value) score++;\n            if (document.getElementById('exercise3').value) score++;\n            document.getElementById('scoreValue').textContent = score;\n        }\n\n        // Track score on input change\n        document.querySelectorAll('input').forEach(input => {\n            input.addEventListener('input', updateScore);\n        });\n\n        startTimer();\n    </script>\n</body>\n</html>
